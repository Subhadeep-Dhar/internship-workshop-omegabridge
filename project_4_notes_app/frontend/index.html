<!DOCTYPE html>
<html>

<head>

    <title>
        Notes App
    </title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="app">

        <header class="topbar">

            <div class="logo">

                📝 <span>My Notes</span>

            </div>

            <div class="search-box">

                <input type="text" id="search" placeholder="Search notes..." onkeyup="searchNotes()">

            </div>

            <button class="logout-btn" onclick="logout()">

                Logout

            </button>

        </header>


        <!-- ADD NOTE -->

        <div class="note-creator">

            <input type="text" id="title" placeholder="Title">

            <textarea id="content" placeholder="Take a note..."></textarea>

            <div class="creator-bottom">

                <select id="color">

                    <option value="#ffffff">
                        White
                    </option>

                    <option value="#fef3bd">
                        Yellow
                    </option>

                    <option value="#d7e3fc">
                        Blue
                    </option>

                    <option value="#faafa8">
                        Red
                    </option>

                    <option value="#d3bfdb">
                        Purple
                    </option>

                    <option value="#e2f6d3">
                        Green
                    </option>

                </select>

                <button onclick="createNote()">

                    Add Note

                </button>

            </div>

        </div>


        <h2 class="section-title">

            📌 Pinned

        </h2>

        <div class="notes-grid" id="pinnedNotes">

        </div>


        <h2 class="section-title">

            Notes

        </h2>

        <div class="notes-grid" id="notes">

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js">
    </script>

    <script src="script.js">
    </script>

</body>

</html>
