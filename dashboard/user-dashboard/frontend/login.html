<!DOCTYPE html>
<html>
<head>

    <title>Login</title>

    <link rel="stylesheet"
    href="style.css">

</head>
<body>

<div class="container auth-box">

    <h2>Login</h2>

    <input type="email"
    id="loginEmail"
    placeholder="Email">

    <br>

    <input type="password"
    id="loginPassword"
    placeholder="Password">

    <br>

    <button onclick="login()">
        Login
    </button>

    <p>
        Don't have account?
        <a href="signup.html">
            Signup
        </a>
    </p>

</div>

<script src=
"https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js">
</script>

<script src="script.js"></script>

</body>
</html>
