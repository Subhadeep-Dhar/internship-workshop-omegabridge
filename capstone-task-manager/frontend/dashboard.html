<!DOCTYPE html>
<html>

<head>

    <title>Dashboard</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <div class="top-bar">

            <h1>
                Task Dashboard
            </h1>

            <button class="logout-btn" onclick="logout()">

                Logout

            </button>

        </div>


        <div class="stats">

            <div class="stat-card">

                <h3 id="totalTasks">
                    0
                </h3>

                <p>Total Tasks</p>

            </div>

            <div class="stat-card">

                <h3 id="completedTasks">
                    0
                </h3>

                <p>Completed</p>

            </div>

            <div class="stat-card">

                <h3 id="pendingTasks">
                    0
                </h3>

                <p>Pending</p>

            </div>

        </div>


        <div class="task-form">

            <input type="text" id="taskInput" placeholder="Enter Task">

            <select id="category">

                <option value="Personal">
                    Personal
                </option>

                <option value="Work">
                    Work
                </option>

                <option value="Urgent">
                    Urgent
                </option>

            </select>

            <input type="date" id="dueDate">

            <button onclick="addTask()">

                Add Task

            </button>

        </div>


        <ul id="taskList">

        </ul>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js">
    </script>

    <script src="script.js">
    </script>

</body>

</html>
