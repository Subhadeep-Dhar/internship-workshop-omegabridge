<!DOCTYPE html>
<html>

<head>

    <title>
        Mini Store
    </title>

    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

    <div class="container">

        <div class="top-bar">

            <div class="logo">

                <h1>
                    Mini Store
                </h1>

                <p>
                    Shop smarter, faster
                </p>

            </div>

            <div class="nav-links">

                <input type="text" id="search" placeholder="Search products..." onkeyup="searchProducts()">

                <a class="nav-btn" href="index.html">

                    <button>
                        Home
                    </button>

                </a>

                <a class="nav-btn" href="cart.html">

                    <button class="cart-btn">
                        Cart
                    </button>

                </a>

                <a class="nav-btn" href="orders.html">

                    <button>
                        Orders
                    </button>

                </a>

                <a class="nav-btn primary-btn" href="login.html">

                    <button>
                        Login
                    </button>

                </a>

                <a class="nav-btn" href="signup.html">

                    <button>
                        Signup
                    </button>

                </a>

                <button class="logout-btn" onclick="logout()">

                    Logout

                </button>

            </div>

        </div>

        <div class="grid" id="products">

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js">
    </script>

    <script src="script.js">
    </script>

</body>

</html>
